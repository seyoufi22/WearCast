<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>WearCast - Verify your Driver Account</title>
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap');

        body {
            background-color: #202124;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', 'Roboto', Helvetica, Arial, sans-serif;
            color: #e8eaed;
        }

        .email-wrapper {
            width: 100%;
            padding: 20px 0;
            background-color: #202124;
        }

        .email-container {
            max-width: 580px;
            margin: 0 auto;
            border: 1px solid #5f6368;
            border-radius: 8px;
            padding: 40px 30px;
            background-color: #202124;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-text {
            font-family: 'Google Sans', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .color-blue {
            color: #4086F4;
        }

        .header-title {
            text-align: center;
            font-size: 24px;
            font-weight: 400;
            color: #e8eaed;
            margin-top: 10px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #3c4043;
        }

        .content-text {
            font-size: 16px;
            line-height: 1.5;
            color: #e8eaed;
            margin-bottom: 25px;
        }

        .code-display {
            text-align: center;
            font-size: 40px;
            font-weight: 500;
            letter-spacing: 4px;
            color: #e8eaed;
            margin: 40px 0;
        }

        .footer-text {
            font-size: 12px;
            color: #9aa0a6;
            line-height: 1.5;
            margin-top: 30px;
            padding-top: 20px;
        }

        .signature {
            margin-top: 20px;
            font-size: 14px;
            color: #e8eaed;
        }

        @media only screen and (max-width: 600px) {
            .email-container {
                border: none;
                padding: 20px;
            }

            .code-display {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <div class="logo-container">
                <span class="logo-text">
                    <span class="color-blue">WearCast</span>
                </span>
            </div>
            <div class="header-title">
                Verify your Driver Account
            </div>
            <div class="content-text">
                Hello Captain {{name}},
                <br><br>
                Welcome to the WearCast Delivery network. To activate your driver account and start receiving delivery requests, please use this code:
            </div>
            <div class="code-display">
                {{code}}
            </div>
            <div class="content-text" style="font-size: 14px;">
                This code will expire in 60 minutes.
            </div>
            <div class="footer-text">
                <div class="signature">
                    Thank You,<br>
                    <strong>WearCast Operations Team</strong>
                </div>
                <br>
                <div style="border-top: 1px solid #3c4043; padding-top: 15px;">
                    WearCast
                </div>
            </div>
        </div>
    </div>
</body>
</html>
